services:
  postgres:
    container_name: n8n-postgres
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
    volumes:
      - /srv/data/n8n/postgres:/var/lib/postgresql
      - ./apps/n8n/init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    networks:
      - homelab-docker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:2.28.5
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - GENERIC_TIMEZONE="Europe/Oslo"
      - N8N_HOST=n8n.halvorteigen.no
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.halvorteigen.no
      - WEBHOOK_URL=https://n8n.halvorteigen.no/
      - N8N_PROXY_HOPS=2
    volumes:
      - /srv/data/n8n/n8n:/home/node/.n8n
    networks:
      - homelab-docker
    healthcheck:
      test:
        - CMD-SHELL
        - wget --spider http://localhost:5678/healthz > /dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  n8n-runner:
    container_name: n8n-runner
    image: n8nio/runners:2.29.8
    restart: always
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    networks:
      - homelab-docker
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const socket = require('node:net').connect(5679, 'n8n'); socket.on('connect',
          () => { socket.end(); process.exit(0); }); socket.on('error', () =>
          process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      n8n:
        condition: service_healthy

networks:
  homelab-docker:
    name: homelab-docker
    external: true
