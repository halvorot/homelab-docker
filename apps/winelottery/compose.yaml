services:
  winelottery:
    container_name: winelottery
    image: ghcr.io/halvorot/wine-lottery-website:20260615131530
    restart: unless-stopped
    networks:
      - homelab-docker
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  homelab-docker:
    name: homelab-docker
    external: true
