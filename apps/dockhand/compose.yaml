services:
  dockhand:
    image: fnsys/dockhand:v1.0.36
    container_name: dockhand
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand_data:/app/data
    networks:
      - homelab-docker

networks:
  homelab-docker:
    name: homelab-docker
    external: true

volumes:
  dockhand_data: