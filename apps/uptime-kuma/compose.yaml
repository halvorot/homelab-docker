services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: uptime-kuma
    restart: always
    volumes:
      - uptime_kuma_data:/app/data  # Configuring persistent storage
    environment:
      - TZ=Europe/Oslo
      - UMASK=0022  # Set your file permissions manually
    networks:
      - homelab-docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uptime_kuma_data:

networks:
  homelab-docker:
    name: homelab-docker
    external: true