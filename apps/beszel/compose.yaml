services:
  beszel:
    image: henrygd/beszel:0.18.7
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: https://beszel.halvorteigen.no
      USER_CREATION: false
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    networks:
      - homelab-docker
    healthcheck:
      test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
      interval: 120s
      start_period: 10s
      timeout: 5s

  beszel-agent:
    image: henrygd/beszel-agent:0.18.7
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://beszel:8090
      TOKEN: ${BESZEL_AGENT_TOKEN:-missing-token}
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIILi+XG+1ZLpnLyC3bWNCFEgY5/ksa9ulgp1K6J+jnIq"
    healthcheck:
      test: ['CMD', '/agent', 'health']
      interval: 120s

volumes:
  beszel_data:
  beszel_socket:
  beszel_agent_data:

networks:
  homelab-docker:
    name: homelab-docker
    external: true
