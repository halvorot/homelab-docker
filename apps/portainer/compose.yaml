services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    restart: always
    environment:
      - TRUSTED_ORIGINS=portainer.halvorteigen.no
    networks:
      - homelab-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
    name: portainer_data

networks:
  homelab-docker:
    name: homelab-docker
    external: true