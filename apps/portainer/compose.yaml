services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    restart: always
    environment:
      - TRUSTED_ORIGINS=portainer.halvorteigen.no
    networks:
      - homelab-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    healthcheck:
      test: ["CMD", "/portainer", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  portainer_data:
    name: portainer_data

networks:
  homelab-docker:
    name: homelab-docker
    external: true
