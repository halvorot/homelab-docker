services:
  voiceboard-server:
    container_name: voiceboard-server
    image: ghcr.io/halvorot/speech-to-whiteboard-server:20260704-211620
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${VOICEBOARD_SUPABASE_URL}
      - DATABASE_URL=${VOICEBOARD_DATABASE_URL}
      - DEEPGRAM_API_KEY=${VOICEBOARD_DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${VOICEBOARD_GROQ_API_KEY}
      - PORT=8080
    networks:
      - homelab-docker
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  voiceboard:
    container_name: voiceboard
    image: ghcr.io/halvorot/speech-to-whiteboard-client:20260706-225606
    restart: unless-stopped
    depends_on:
      - voiceboard-server
    networks:
      - homelab-docker

networks:
  homelab-docker:
    name: homelab-docker
    external: true
