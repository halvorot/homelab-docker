services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      - llama-cpp
    environment:
      OPENAI_API_BASE_URL: http://llama-cpp:8080/v1
      OPENAI_API_KEY: ${LLAMA_CPP_API_KEY:-missing-api-key}
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY:-}
      WEBUI_URL: https://ai.halvorteigen.no
      CORS_ALLOW_ORIGIN: https://ai.halvorteigen.no
      WEBUI_AUTH: "True"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
      SCARF_NO_ANALYTICS: "true"
    volumes:
      - /srv/data/open-webui:/app/backend/data
    networks:
      - homelab-docker

networks:
  homelab-docker:
    name: homelab-docker
    external: true
