services:
  llama-cpp:
    container_name: llama-cpp
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      LLAMA_API_KEY: ${LLAMA_CPP_API_KEY:-missing-api-key}
    command:
      - --hf-repo
      - ${LLAMA_MODEL_REPO:-bartowski/Qwen2.5-7B-Instruct-GGUF}:${LLAMA_MODEL_QUANT:-Q4_K_M}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "${LLAMA_CONTEXT_SIZE:-8192}"
      - --threads
      - "${LLAMA_THREADS:-8}"
      - --threads-batch
      - "${LLAMA_BATCH_THREADS:-8}"
      - --batch-size
      - "${LLAMA_BATCH_SIZE:-1024}"
      - --ubatch-size
      - "${LLAMA_UBATCH_SIZE:-512}"
      - --parallel
      - "1"
      - --n-gpu-layers
      - "0"
      - --flash-attn
      - auto
      - --mlock
      - --alias
      - local-llm
      - --jinja
      - --metrics
    volumes:
      - /srv/data/llama-cpp/cache:/root/.cache
    tmpfs:
      - /tmp
    networks:
      - homelab-docker

networks:
  homelab-docker:
    name: homelab-docker
    external: true
