name: deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: homelab-docker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect Caddyfile changes
        if: github.event_name == 'push'
        id: caddyfile_changes
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- proxy/Caddyfile; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write env
        run: |
          umask 077
          printf '%s\n' "${{ secrets.PLATFORM_ENV }}" > .env

      - name: Ensure Docker network
        run: docker network create homelab-docker || true

      - name: Validate compose
        run: ./scripts/deploy.sh config --quiet

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Deploy
        run: ./scripts/deploy.sh

      - name: Restart Caddy
        if: github.event_name == 'push' && steps.caddyfile_changes.outputs.changed == 'true'
        run: docker compose -f docker-compose.yml restart caddy
