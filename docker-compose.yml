name: homelab-docker

services:
  caddy:
    container_name: caddy
    image: caddy:2.11-alpine
    restart: unless-stopped
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/data/caddy/data:/data
      - /srv/data/caddy/config:/config
    networks:
      - homelab-docker
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:2026.6.1
    restart: unless-stopped
    command: tunnel --metrics 0.0.0.0:2000 --no-autoupdate run --token ${CLOUDFLARED_TOKEN:-missing-token}
    networks:
      - homelab-docker
    depends_on:
      - caddy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2000/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  homelab-docker:
    name: homelab-docker
    external: true
