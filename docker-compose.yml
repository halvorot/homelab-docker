name: homelab-docker

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      EXCALIDRAW_DOMAIN: ${EXCALIDRAW_DOMAIN:-excalidraw.example.com}
      EXCALIDRAW_UPSTREAM: ${EXCALIDRAW_UPSTREAM:-excalidraw:80}
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/data/caddy/data:/data
      - /srv/data/caddy/config:/config
    networks:
      - homelab-docker
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:-missing-token}
    networks:
      - homelab-docker
    depends_on:
      - caddy

networks:
  homelab-docker:
    name: homelab-docker
    external: true
