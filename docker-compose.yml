name: homelab-docker

services:
  caddy:
    container_name: caddy
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/data/caddy/data:/data
      - /srv/data/caddy/config:/config
    networks:
      - homelab-docker
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:2026.6.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:-missing-token}
    networks:
      - homelab-docker
    depends_on:
      - caddy

networks:
  homelab-docker:
    name: homelab-docker
    external: true
